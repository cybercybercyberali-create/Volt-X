name: Render Environment Manager

on:
  push:
    paths:
      - '.github/trigger-env-read'   # push this file to trigger a read
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: read / set'
        required: true
        default: 'read'
        type: choice
        options:
          - read
          - set
      key:
        description: 'Env var name (for set)'
        required: false
      value:
        description: 'Env var value (for set)'
        required: false

jobs:
  manage-env:
    runs-on: ubuntu-latest
    steps:
      - name: Read current env vars
        if: github.event_name == 'push' || github.event.inputs.action == 'read'
        uses: actions/github-script@v7
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        with:
          script: |
            const res = await fetch('https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/env-vars', {
              headers: { 'Authorization': `Bearer ${process.env.RENDER_API_KEY}` }
            });
            const data = await res.json();

            let table = '| Key | Value |\n|-----|-------|\n';
            if (Array.isArray(data)) {
              for (const item of data) {
                const key = item.envVar?.key || item.key || '';
                const val = item.envVar?.value || item.value || '';
                const masked = key.toLowerCase().includes('key') || key.toLowerCase().includes('token') || key.toLowerCase().includes('secret')
                  ? (val ? '`[SET ✅]`' : '`[MISSING ❌]`')
                  : `\`${val || '[EMPTY]'}\``;
                table += `| \`${key}\` | ${masked} |\n`;
              }
            } else {
              table = '```json\n' + JSON.stringify(data, null, 2) + '\n```';
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔧 Render ENV Report - ${new Date().toISOString().slice(0,16)}`,
              body: `## Current Render Environment Variables\n\n${table}\n\n> Generated by render-env-manager workflow`,
              labels: ['render-env']
            });

      - name: Set env var
        if: github.event.inputs.action == 'set'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ENV_KEY: ${{ github.event.inputs.key }}
          ENV_VALUE: ${{ github.event.inputs.value }}
        run: |
          # Get current env vars
          CURRENT=$(curl -s \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/env-vars")

          # Build updated list
          UPDATED=$(echo "$CURRENT" | python3 -c "
          import sys, json, os
          data = json.load(sys.stdin)
          key = os.environ['ENV_KEY']
          value = os.environ['ENV_VALUE']
          if isinstance(data, list):
              found = False
              for item in data:
                  k = item.get('envVar', item).get('key', item.get('key', ''))
                  if k == key:
                      if 'envVar' in item:
                          item['envVar']['value'] = value
                      else:
                          item['value'] = value
                      found = True
              if not found:
                  data.append({'key': key, 'value': value})
              # Format for PUT
              result = [{'key': item.get('envVar', item).get('key', item.get('key','')),
                         'value': item.get('envVar', item).get('value', item.get('value',''))}
                        for item in data]
              print(json.dumps(result))
          ")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$UPDATED" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/env-vars")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Set $ENV_KEY → HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Environment variable updated successfully"
          else
            echo "❌ Failed: $(echo "$RESPONSE" | head -1)"
            exit 1
          fi
