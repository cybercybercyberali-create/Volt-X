name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        id: trigger
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/deploys")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          DEPLOY_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")

          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Deploy triggered! ID: $DEPLOY_ID"
          else
            echo "❌ Deploy trigger failed: $BODY"
            exit 1
          fi

      - name: Wait and verify deployment
        run: |
          echo "⏳ Waiting 3 minutes for deploy to complete..."
          sleep 180

          # Check service health
          SERVICE_INFO=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0")

          STATUS=$(echo "$SERVICE_INFO" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('serviceDetails', {}).get('env', 'unknown'))
          " 2>/dev/null || echo "unknown")

          echo "Service status check done"

      - name: Fetch logs on failure
        if: failure()
        run: |
          echo "🔍 Fetching Render logs due to failure..."
          LOGS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/logs?limit=100")
          echo "$LOGS" > render_logs.txt
          cat render_logs.txt

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let logs = '';
            try { logs = fs.readFileSync('render_logs.txt', 'utf8').slice(0, 8000); } catch(e) { logs = 'Could not fetch logs'; }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Deploy Failed - ${new Date().toISOString()}`,
              body: `## Deploy Failure\n\nCommit: ${context.sha}\n\n## Render Logs\n\`\`\`\n${logs}\n\`\`\``,
              labels: ['bug', 'render-error']
            });
