name: Monitor Render Health

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:         # manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Get service URL from Render
        id: service
        run: |
          INFO=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0")

          URL=$(echo "$INFO" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('serviceDetails', {}).get('url', '') or d.get('service', {}).get('serviceDetails', {}).get('url', ''))
          " 2>/dev/null || echo "")

          echo "service_url=$URL" >> $GITHUB_OUTPUT
          echo "Service URL: $URL"

      - name: Check /health endpoint
        id: health
        run: |
          URL="${{ steps.service.outputs.service_url }}"
          if [ -z "$URL" ]; then
            # Fallback — try to find URL from deploys
            URL=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/deploys?limit=1" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('serviceId','') if d else '')" 2>/dev/null || echo "")
          fi

          if [ -n "$URL" ]; then
            HEALTH=$(curl -s --max-time 15 "$URL/health" || echo '{"status":"unreachable"}')
            echo "Health response: $HEALTH"
            STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "health_status=$STATUS" >> $GITHUB_OUTPUT
          else
            echo "health_status=url_unknown" >> $GITHUB_OUTPUT
          fi

      - name: Fetch Render logs
        id: logs
        run: |
          LOGS_RAW=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/logs?limit=50")

          # Extract log lines
          LOGS=$(echo "$LOGS_RAW" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              if isinstance(data, list):
                  lines = [item.get('message','') for item in data[-50:]]
              elif isinstance(data, dict):
                  lines = [data.get('message', str(data))]
              else:
                  lines = [str(data)]
              print('\n'.join(lines))
          except Exception as e:
              print(f'Log parse error: {e}')
              print(sys.stdin.read()[:2000])
          " 2>/dev/null || echo "Could not parse logs")

          # Check for errors in logs
          ERROR_COUNT=$(echo "$LOGS" | grep -ci "error\|exception\|traceback\|critical" || echo "0")
          echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT

          # Save logs for later
          echo "$LOGS" > /tmp/render_logs.txt
          echo "Recent logs saved"

      - name: Check latest deploy status
        id: deploy
        run: |
          DEPLOYS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0/deploys?limit=1")

          DEPLOY_STATUS=$(echo "$DEPLOYS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d and isinstance(d, list):
              latest = d[0]
              print(latest.get('status', 'unknown'))
          else:
              print('unknown')
          " 2>/dev/null || echo "unknown")

          echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT
          echo "Latest deploy status: $DEPLOY_STATUS"

      - name: Report issues to GitHub
        if: |
          steps.deploy.outputs.deploy_status == 'failed' ||
          steps.deploy.outputs.deploy_status == 'canceled' ||
          steps.logs.outputs.error_count > 5
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logs = fs.readFileSync('/tmp/render_logs.txt', 'utf8').slice(-6000);
            const deployStatus = '${{ steps.deploy.outputs.deploy_status }}';
            const errorCount = '${{ steps.logs.outputs.error_count }}';
            const healthStatus = '${{ steps.health.outputs.health_status }}';

            // Check if there's already an open issue for this
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'render-error',
              state: 'open'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 Render Issue Detected - ${new Date().toISOString().slice(0,16)}`,
                body: [
                  `## Render Health Report`,
                  `- **Deploy Status**: ${deployStatus}`,
                  `- **Health Check**: ${healthStatus}`,
                  `- **Errors in logs**: ${errorCount}`,
                  ``,
                  `## Recent Logs`,
                  '```',
                  logs,
                  '```',
                  ``,
                  `> Auto-generated by monitor workflow`
                ].join('\n'),
                labels: ['bug', 'render-error']
              });
              console.log('Created new issue for Render error');
            } else {
              // Update existing issue with latest logs
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: [
                  `## Update - ${new Date().toISOString().slice(0,16)}`,
                  `- Deploy: ${deployStatus} | Health: ${healthStatus} | Errors: ${errorCount}`,
                  ``,
                  '```',
                  logs.slice(-3000),
                  '```'
                ].join('\n')
              });
              console.log('Updated existing issue');
            }

      - name: All healthy - close any open issues
        if: |
          steps.deploy.outputs.deploy_status == 'live' &&
          steps.logs.outputs.error_count <= 5
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'render-error',
              state: 'open'
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Resolved** - Service is healthy again (${new Date().toISOString().slice(0,16)})`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
