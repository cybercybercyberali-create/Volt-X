name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          INFO=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d79b7fkhg0os73e4iru0")

          URL=$(echo "$INFO" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              url = d.get('serviceDetails', {}).get('url', '') or d.get('service', {}).get('serviceDetails', {}).get('url', '')
              print(url)
          except:
              print('')
          " 2>/dev/null || echo "")

          if [ -n "$URL" ]; then
            echo "Pinging: $URL/health"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$URL/health" || echo "000")
            echo "HTTP Status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Service is alive"
            else
              echo "⚠️ Service returned $STATUS (may be waking up)"
            fi
          else
            echo "⚠️ Could not determine service URL"
          fi
