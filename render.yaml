services:
  - type: web
    name: omega-bot
    runtime: python
    plan: free
    buildCommand: python setup.py && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER_PLAN
        value: free
